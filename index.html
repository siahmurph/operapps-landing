<!doctype html>
<html lang="en" data-bs-theme="dark">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Operapps</title>
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
		<style>
			body {
				min-height: 100vh;
				background-color: var(--bs-body-bg);
			}

			.app-header {
				background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
				border-bottom: 1px solid rgba(255, 255, 255, 0.08);
			}

			[data-bs-theme="light"] .app-header {
				background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
			}

			.site-title {
				font-size: 3.2rem;
				font-weight: 900;
				letter-spacing: 0.18em;
				text-transform: uppercase;
				color: #f97316;
				text-shadow:
					0 0 30px rgba(249, 115, 22, 0.5),
					0 2px 8px rgba(0, 0, 0, 0.6);
				line-height: 1;
				font-style: italic;
			}

			.site-sub {
				font-size: 0.75rem;
				letter-spacing: 0.08em;
				text-transform: uppercase;
				opacity: 0.55;
			}

			.app-tile {
				border-radius: 0.65rem;
				border-color: rgba(255, 255, 255, 0.1) !important;
				text-decoration: none;
				color: inherit;
				transition:
					transform 0.15s,
					box-shadow 0.15s,
					border-color 0.15s;
				display: block;
			}

			.app-tile:hover {
				transform: translateY(-3px);
				box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
				border-color: rgba(249, 115, 22, 0.45) !important;
				color: inherit;
			}

			.app-tile.is-down {
				border-color: rgba(220, 53, 69, 0.5) !important;
			}

			.app-tile.is-down:hover {
				border-color: #dc3545 !important;
			}

			[data-bs-theme="light"] .app-tile {
				border-color: #cbd5e1 !important;
			}

			.tile-icon {
				font-size: 2.4rem;
				line-height: 1;
			}

			.tile-name {
				font-size: 1.1rem;
				font-weight: 700;
				letter-spacing: 0.02em;
			}

			.tile-desc {
				font-size: 0.8rem;
				opacity: 0.6;
				line-height: 1.4;
			}

			.status-dot {
				width: 8px;
				height: 8px;
				border-radius: 50%;
				flex-shrink: 0;
			}

			.status-dot.live {
				background: #10b981;
				box-shadow: 0 0 6px rgba(16, 185, 129, 0.6);
			}
			.status-dot.maintenance {
				background: #ef4444;
				box-shadow: 0 0 6px rgba(239, 68, 68, 0.6);
			}
			.status-dot.unknown {
				background: #6b7280;
			}

			.status-label {
				font-size: 0.68rem;
				letter-spacing: 0.05em;
				text-transform: uppercase;
				opacity: 0.7;
			}

			.container-badge {
				display: inline-flex;
				align-items: center;
				gap: 0.35rem;
				font-size: 0.65rem;
				font-weight: 700;
				letter-spacing: 0.07em;
				text-transform: uppercase;
				padding: 0.15rem 0.55rem;
				border-radius: 999px;
				border: 1px solid transparent;
			}

			.container-badge.is-online {
				background: rgba(16, 185, 129, 0.12);
				color: #10b981;
				border-color: rgba(16, 185, 129, 0.3);
			}

			.container-badge.is-offline {
				background: rgba(220, 53, 69, 0.12);
				color: #dc3545;
				border-color: rgba(220, 53, 69, 0.3);
			}

			.container-badge.is-checking {
				background: rgba(107, 114, 128, 0.1);
				color: #6b7280;
				border-color: rgba(107, 114, 128, 0.2);
			}
		</style>
	</head>
	<body>
		<header
			class="app-header px-4 py-3 mb-5 d-flex align-items-center justify-content-between">
			<div>
				<div class="site-title">
					<i
						class="bi bi-tv-fill me-2 text-warning"
						style="font-style: normal"></i
					>Operapps
				</div>
				<div class="site-sub text-secondary mt-1">WCIU Production Tools</div>
			</div>
			<button
				class="btn btn-sm btn-outline-light border-0 opacity-75"
				id="theme-toggle"
				title="Toggle theme">
				<i class="bi bi-moon-fill" id="theme-icon"></i>
			</button>
		</header>

		<main class="container-lg px-3 px-md-4 pb-5">
			<div class="row g-4" id="tile-grid">
				<!-- Tiles injected by app.js -->
			</div>
		</main>

		<footer class="text-center py-4 mt-2">
			<small
				class="text-secondary opacity-50"
				style="
					font-size: 0.7rem;
					letter-spacing: 0.08em;
					text-transform: uppercase;
				"
				>Operations Applications</small
			>
		</footer>

		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
		<script src="app.js"></script>
	</body>
</html>
